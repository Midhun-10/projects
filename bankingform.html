<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Form</title>
</head>
<body>
    <div id="title"><marquee behavior="" direction="" scrollamount="30"><h1>Banking Form</h1></marquee></div>
    <style>
        #title{
            background-color: yellow;
            text-align: center;
            padding: auto;
        }
    </style>
    
    <form action="">

        <fieldset>

            <legend><h3>Xyz Bank</h3></legend>

            <table border="1" width="1500" cellspacing="10" cellpadding="10">

                <tr>
                    <th colspan="2">Xyz Bank Account Application</th>
                </tr>

                <tr>
                    <td><label for="1">Full Name(as per ID proof)</label></td>
                    <td><input type="text" name="name" id="1" placeholder="enter name"></td>
                </tr>

                 <tr>
                    <td><label for="2">Date of birth</label></td>
                    <td><input type="date" name="dob" id="2" placeholder="enter DOB"></td>
                </tr>

                 <tr>
                    <td><label for="">Gender</label></td>
                    <td>
                        <label for="3.1">Male</label>
                        <input type="radio" name="Gender" id="3.1" value="male">
                        <label for="3.2">female</label>
                        <input type="radio" name="Gender" id="3.2" value="female">
                    </td>
                </tr>

                <tr>
                    <td><label for="4">Martial Status</label></td>
                    <td><input type="text" name="Martial_Status" id="4" placeholder="enter martial status"></td>
                </tr>

                <tr>
                    <td><label for="">Nationality</label></td>
                    <td><input type="text" value="India" readonly></td>
                </tr>

                <tr>
                    <td><label for="">Father's Name</label></td>
                    <td><input type="text" name="father_name" id="5" placeholder="enter father's name"></td>
                </tr>

                 <tr>
                    <td><label for="6">Mother's Name</label></td>
                    <td><input type="text" name="mother_name" id="6" placeholder="enter mother's name"></td>
                </tr>
            </table><br><br>
            <button type="submit">submit</button>
            <button type="reset">reset</button>
        </fieldset>
    </form>
</body>
</html>
